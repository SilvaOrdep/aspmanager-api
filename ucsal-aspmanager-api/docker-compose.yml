services:
  postgres:
    image: postgres:15-alpine
    container_name: aspmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    image: gab1203/asp_manager_api:latest
    container_name: aspmanager-api
    ports:
      - "9090:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

    depends_on:
      - postgres

  frontend:
    # Substitua pelo caminho relativo da pasta onde está o Dockerfile do Angular
    image: gab1203/aspmanager-frontend:latest
    container_name: aspmanager-frontend
    ports:
      - "4200:80" # Expõe no host na porta 4200, mapeando para a 80 do Nginx
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
